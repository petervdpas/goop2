openapi: "3.0.3"
info:
  title: Goop2 Cluster Binary Protocol
  description: |
    Contract for binaries that execute jobs in a goop2 cluster.

    A binary is a child process started by the worker peer (goop2). It communicates
    over stdin/stdout using newline-delimited JSON. The worker peer sends jobs on
    stdin and reads results from stdout. The binary never touches the network —
    goop2 handles all P2P routing to the cluster host.

    ## Lifecycle

    ```
    1. Worker peer starts the binary
    2. Worker peer sends check-job on stdin  → binary responds on stdout
    3. Worker peer sends real jobs on stdin   → binary responds with progress/result on stdout
    4. Worker peer kills binary on cancel or shutdown
    ```

    ## Binary modes

    - **oneshot** (default): started per job, exits after result
    - **daemon**: started once, handles multiple jobs via newline-delimited JSON on stdin

    ## Code examples

    Complete working binaries in Bash, Python, Go, C, and C++:

    **[View code examples](/api/executor-examples)**
  version: "2.0.0"
  license:
    name: GPL-2.0-only

servers:
  - url: http://localhost:8787
    description: Default goop2 viewer port

paths:
  /api/cluster/binary:
    post:
      operationId: setBinary
      summary: Set the binary path for this worker
      description: |
        Sets the local binary that will execute jobs for this cluster. The binary
        is a child process that speaks the goop2 cluster JSON protocol over
        stdin/stdout. Setting the binary resets the verified flag — the worker
        peer must re-run the check-job before the host dispatches real work.
      x-codeSamples:
        - lang: Bash
          source: |
            curl -sf -X POST http://localhost:8787/api/cluster/binary \
              -H 'Content-Type: application/json' \
              -d '{"path":"/usr/bin/renderer","mode":"oneshot"}'
        - lang: Python
          source: |
            import requests
            requests.post("http://localhost:8787/api/cluster/binary",
                json={"path": "/usr/bin/renderer", "mode": "oneshot"})
        - lang: Go
          source: |
            postJSON("http://localhost:8787/api/cluster/binary",
                map[string]any{"path": "/usr/bin/renderer", "mode": "oneshot"})
        - lang: C
          source: |
            /* libcurl */
            CURL *c = curl_easy_init();
            struct curl_slist *h = curl_slist_append(NULL, "Content-Type: application/json");
            curl_easy_setopt(c, CURLOPT_URL, "http://localhost:8787/api/cluster/binary");
            curl_easy_setopt(c, CURLOPT_POSTFIELDS,
                "{\"path\":\"/usr/bin/renderer\",\"mode\":\"oneshot\"}");
            curl_easy_setopt(c, CURLOPT_HTTPHEADER, h);
            curl_easy_perform(c);
            curl_slist_free_all(h);
            curl_easy_cleanup(c);
        - lang: C++
          source: |
            // libcurl + nlohmann/json
            json body = {{"path", "/usr/bin/renderer"}, {"mode", "oneshot"}};
            post_json("http://localhost:8787/api/cluster/binary", body);
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BinaryRequest"
      responses:
        "200":
          description: Binary path set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BinaryResponse"
        "400":
          description: Missing binary path
        "409":
          description: Not a cluster worker

  /_protocol/check-job:
    post:
      operationId: checkJob
      summary: "stdin/stdout: Check-job handshake"
      tags: [Binary Protocol]
      description: |
        Not an HTTP endpoint — this documents the stdin/stdout check-job protocol.

        The worker peer sends a check-job on stdin before dispatching real work.
        The binary proves it speaks the protocol and reports its capabilities.
      x-codeSamples:
        - lang: Bash
          source: |
            # Read from stdin
            read -r line
            TYPE=$(echo "$line" | python3 -c "import sys,json; print(json.load(sys.stdin)['type'])")

            if [ "$TYPE" = "__check__" ]; then
              echo '{"status":"done","result":{"types":["render"],"version":"1.0"}}'
            fi
        - lang: Python
          source: |
            import sys, json

            for line in sys.stdin:
                job = json.loads(line)
                if job["type"] == "__check__":
                    print(json.dumps({
                        "status": "done",
                        "result": {
                            "types": ["render", "transcode"],
                            "version": "1.0",
                            "capacity": 2
                        }
                    }), flush=True)
        - lang: Go
          source: |
            scanner := bufio.NewScanner(os.Stdin)
            for scanner.Scan() {
                var job struct {
                    Type string `json:"type"`
                }
                json.Unmarshal(scanner.Bytes(), &job)

                if job.Type == "__check__" {
                    json.NewEncoder(os.Stdout).Encode(map[string]any{
                        "status": "done",
                        "result": map[string]any{
                            "types": []string{"render"}, "version": "1.0", "capacity": 4,
                        },
                    })
                }
            }
        - lang: C
          source: |
            char line[65536];
            while (fgets(line, sizeof(line), stdin)) {
                cJSON *job = cJSON_Parse(line);
                const char *type = cJSON_GetObjectItem(job, "type")->valuestring;
                if (strcmp(type, "__check__") == 0) {
                    printf("{\"status\":\"done\",\"result\":"
                           "{\"types\":[\"render\"],\"version\":\"1.0\"}}\n");
                    fflush(stdout);
                }
                cJSON_Delete(job);
            }
        - lang: C++
          source: |
            std::string line;
            while (std::getline(std::cin, line)) {
                auto job = json::parse(line);
                if (job["type"] == "__check__") {
                    json result = {{"status","done"},{"result",{
                        {"types", {"render","transcode"}},
                        {"version","1.0"}, {"capacity",4}
                    }}};
                    std::cout << result.dump() << std::endl;
                }
            }
      requestBody:
        description: "Worker peer writes to binary's stdin"
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
            example:
              job_id: "__check__"
              type: "__check__"
              payload: {}
      responses:
        "200":
          description: "Binary writes to stdout"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoneOutput"
              example:
                status: "done"
                result:
                  types: ["render", "transcode"]
                  version: "1.0"
                  capacity: 2

  /_protocol/job-execution:
    post:
      operationId: executeJob
      summary: "stdin/stdout: Execute a job"
      tags: [Binary Protocol]
      description: |
        Not an HTTP endpoint — this documents the stdin/stdout job execution protocol.

        The worker peer sends a job on stdin. The binary does the work, optionally
        writes progress lines to stdout, then writes exactly one done or error line.
      x-codeSamples:
        - lang: Bash
          source: |
            while IFS= read -r line; do
              JOB_ID=$(echo "$line" | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
              TYPE=$(echo "$line" | python3 -c "import sys,json; print(json.load(sys.stdin)['type'])")

              [ "$TYPE" = "__check__" ] && echo '{"status":"done","result":{}}' && continue

              # Do work + progress
              for pct in 25 50 75 100; do
                sleep 1
                echo "{\"status\":\"progress\",\"pct\":$pct,\"msg\":\"$pct%\"}"
              done

              # Final result
              echo '{"status":"done","result":{"output":"complete"}}'
            done
        - lang: Python
          source: |
            import sys, json, time

            for line in sys.stdin:
                job = json.loads(line)
                job_id = job["job_id"]

                if job["type"] == "__check__":
                    print(json.dumps({"status":"done","result":{"types":["render"]}}), flush=True)
                    continue

                # Do work + progress
                for pct in range(25, 101, 25):
                    time.sleep(1)
                    print(json.dumps({"status":"progress","pct":pct,"msg":f"{pct}%"}), flush=True)

                # Final result
                try:
                    result = do_work(job)  # your logic here
                    print(json.dumps({"status":"done","result":result}), flush=True)
                except Exception as e:
                    print(json.dumps({"status":"error","error":str(e)}), flush=True)
        - lang: Go
          source: |
            scanner := bufio.NewScanner(os.Stdin)
            for scanner.Scan() {
                var job struct {
                    JobID   string         `json:"job_id"`
                    Type    string         `json:"type"`
                    Payload map[string]any `json:"payload"`
                }
                json.Unmarshal(scanner.Bytes(), &job)

                if job.Type == "__check__" {
                    emit(map[string]any{"status":"done","result":map[string]any{"types":[]string{"render"}}})
                    continue
                }

                // Do work + progress
                for pct := 25; pct <= 100; pct += 25 {
                    time.Sleep(1 * time.Second)
                    emit(map[string]any{"status":"progress","pct":pct,"msg":fmt.Sprintf("%d%%",pct)})
                }

                // Final result
                emit(map[string]any{"status":"done","result":map[string]any{"output":"complete"}})
            }
        - lang: C
          source: |
            char line[65536];
            while (fgets(line, sizeof(line), stdin)) {
                cJSON *job = cJSON_Parse(line);
                const char *type = cJSON_GetObjectItem(job, "type")->valuestring;

                if (strcmp(type, "__check__") == 0) {
                    printf("{\"status\":\"done\",\"result\":{\"types\":[\"render\"]}}\n");
                    fflush(stdout);
                    cJSON_Delete(job);
                    continue;
                }

                // Do work + progress
                for (int pct = 25; pct <= 100; pct += 25) {
                    sleep(1);
                    printf("{\"status\":\"progress\",\"pct\":%d,\"msg\":\"%d%%\"}\n", pct, pct);
                    fflush(stdout);
                }

                printf("{\"status\":\"done\",\"result\":{\"output\":\"complete\"}}\n");
                fflush(stdout);
                cJSON_Delete(job);
            }
        - lang: C++
          source: |
            std::string line;
            while (std::getline(std::cin, line)) {
                auto job = json::parse(line);

                if (job["type"] == "__check__") {
                    std::cout << json{{"status","done"},{"result",{{"types",{"render"}}}}}.dump() << "\n";
                    continue;
                }

                // Do work + progress
                for (int pct = 25; pct <= 100; pct += 25) {
                    std::this_thread::sleep_for(1s);
                    std::cout << json{{"status","progress"},{"pct",pct},{"msg",std::to_string(pct)+"%"}}.dump() << "\n";
                }

                std::cout << json{{"status","done"},{"result",{{"output","complete"}}}}.dump() << std::endl;
            }
      requestBody:
        description: "Worker peer writes to binary's stdin"
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
            example:
              job_id: "j-a1b2c3d4"
              type: "render"
              payload: { "scene": "intro.blend", "frame": 42 }
      responses:
        "200":
          description: "Binary writes to stdout (progress lines + final result)"
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ProgressOutput"
                  - $ref: "#/components/schemas/DoneOutput"
                  - $ref: "#/components/schemas/ErrorOutput"

components:
  schemas:
    BinaryRequest:
      type: object
      properties:
        path:
          type: string
          description: Absolute path to the binary
          example: "/usr/bin/renderer"
        mode:
          type: string
          enum: [oneshot, daemon]
          default: oneshot
          description: |
            oneshot = started per job, exits after result.
            daemon = started once, handles multiple jobs over stdin.
          example: "oneshot"
      required: [path]

    BinaryResponse:
      type: object
      properties:
        status:
          type: string
          example: "ok"
        path:
          type: string
          example: "/usr/bin/renderer"
        mode:
          type: string
          example: "oneshot"

    JobInput:
      type: object
      description: Sent to binary on stdin (one JSON line)
      properties:
        job_id:
          type: string
          example: "j-a1b2c3d4"
        type:
          type: string
          example: "render"
        payload:
          type: object
          additionalProperties: true
          example: { "scene": "intro.blend", "frame": 42 }
      required: [job_id, type]

    ProgressOutput:
      type: object
      description: Written by binary to stdout (optional, zero or more lines)
      properties:
        status:
          type: string
          enum: [progress]
        pct:
          type: integer
          minimum: 0
          maximum: 100
          example: 42
        msg:
          type: string
          example: "rendering frame 84/200"
      required: [status, pct]

    DoneOutput:
      type: object
      description: Written by binary to stdout (exactly one line)
      properties:
        status:
          type: string
          enum: [done]
        result:
          type: object
          additionalProperties: true
          example: { "output_path": "/tmp/render_0042.png" }
      required: [status, result]

    ErrorOutput:
      type: object
      description: Written by binary to stdout (exactly one line, instead of DoneOutput)
      properties:
        status:
          type: string
          enum: [error]
        error:
          type: string
          example: "out of memory"
      required: [status, error]

    CheckJobResult:
      type: object
      description: Result field in DoneOutput when type is "__check__"
      properties:
        types:
          type: array
          items:
            type: string
          description: Job types this binary handles
          example: ["render", "transcode"]
        version:
          type: string
          description: Binary version for diagnostics
          example: "1.0"
        capacity:
          type: integer
          description: Max concurrent jobs
          example: 2
