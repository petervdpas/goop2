<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Todo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/sdk/goop-component-toast.css">
  <link rel="stylesheet" href="/sdk/goop-component-dialog.css">
  <link rel="stylesheet" href="/sdk/goop-component-drag.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="/sdk/goop-data.js"></script>
  <script src="/sdk/goop-identity.js"></script>
  <script src="/sdk/goop-group.js"></script>
  <script src="/sdk/goop-component-base.js"></script>
  <script src="/sdk/goop-component-toast.js"></script>
  <script src="/sdk/goop-component-dialog.js"></script>
  <script src="/sdk/goop-component-template.js"></script>
  <script src="/sdk/goop-component-drag.js"></script>
</head>
<body>
  <div class="todo-app">
    <header class="todo-header">
      <h1 class="todo-title">Todo</h1>
      <p class="todo-subtitle" id="subtitle">Loading&hellip;</p>
    </header>

    <div id="todo-gate" class="todo-gate hidden">
      <div class="gate-card">
        <h2>Members Only</h2>
        <p>This list is only accessible to invited members.</p>
      </div>
    </div>

    <main id="todo-main" class="hidden">
      <div class="todo-input-row" id="input-row">
        <input type="text" id="new-todo" class="todo-input" placeholder="Add a task&hellip;">
        <button id="btn-add" class="btn-add">Add</button>
      </div>

      <div class="todo-stats" id="stats"></div>

      <div id="todo-list" class="todo-list">
        <p class="loading">Loading&hellip;</p>
      </div>
    </main>
  </div>

  <div id="toasts" class="gc-toast-container"></div>

  <div id="confirm-dialog" class="gc-dialog-backdrop hidden">
    <div class="gc-dialog">
      <h2 class="gc-dialog-title">Confirm</h2>
      <div class="gc-dialog-body">
        <p class="gc-dialog-message"></p>
      </div>
      <div class="gc-dialog-buttons">
        <button class="gc-dialog-cancel">Cancel</button>
        <button class="gc-dialog-ok">OK</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
