<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{.Title}} — Goop² Docs</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="/assets/style.css" />
  <link rel="stylesheet" href="/assets/docs.css" />

</head>
<body>
  <div class="container docs-container">
    <header class="header">
      <div class="header-left">
        <div class="logo">📡</div>
        <div>
          <h1>Goop² Documentation</h1>
          <p class="subtitle">User guide &amp; reference</p>
        </div>
      </div>
      <div class="header-right">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <span class="theme-icon">🌙</span>
        </button>
        <a class="nav-link" href="/">Home</a>
      </div>
    </header>

    <div class="docs-layout">
      <nav class="docs-sidebar glass">
        <div class="sidebar-title">Contents</div>
        {{range .Pages}}
        <a class="sidebar-link{{if eq .Slug $.Current.Slug}} active{{end}}" href="/docs/{{.Slug}}">{{.Title}}</a>
        {{end}}
      </nav>

      <main class="docs-content">
        <article class="docs-article glass">
          {{.Current.HTML}}
        </article>

        <div class="docs-nav-footer">
          {{if .Prev}}<a class="docs-nav-btn prev" href="/docs/{{.Prev.Slug}}">&larr; {{.Prev.Title}}</a>{{else}}<span></span>{{end}}
          {{if .Next}}<a class="docs-nav-btn next" href="/docs/{{.Next.Slug}}">{{.Next.Title}} &rarr;</a>{{else}}<span></span>{{end}}
        </div>
      </main>
    </div>

    <script>
      (function(){
        var t = document.getElementById('themeToggle'),
            i = t.querySelector('.theme-icon'),
            h = document.documentElement,
            s = localStorage.getItem('theme') || 'dark';
        h.setAttribute('data-theme', s);
        i.textContent = s === 'dark' ? '☀️' : '🌙';
        t.onclick = function() {
          s = h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
          h.setAttribute('data-theme', s);
          localStorage.setItem('theme', s);
          i.textContent = s === 'dark' ? '☀️' : '🌙';
          if (window.mermaid) mermaid.initialize({startOnLoad:false, theme: s === 'dark' ? 'dark' : 'default'});
          window._initMermaid();
        };
      })();

      window._initMermaid = function() {
        if (!window.mermaid) return;
        var theme = (document.documentElement.getAttribute('data-theme') || 'dark') === 'dark' ? 'dark' : 'default';
        mermaid.initialize({startOnLoad:false, theme:theme});
        document.querySelectorAll('pre > code.language-mermaid').forEach(function(code){
          var pre = code.parentElement;
          var div = document.createElement('pre');
          div.className = 'mermaid';
          div.textContent = code.textContent;
          pre.replaceWith(div);
        });
        mermaid.run({querySelector:'.mermaid'});
      };
      window._initMermaid();

      function _swapContent(html, href) {
        var parser = new DOMParser();
        var doc = parser.parseFromString(html, 'text/html');
        var newArticle = doc.querySelector('.docs-article');
        var newFooter = doc.querySelector('.docs-nav-footer');
        var newSidebar = doc.querySelector('.docs-sidebar');
        var newTitle = doc.querySelector('title');
        if (!newArticle) { location.href = href; return; }
        var oldArticle = document.querySelector('.docs-article');
        var oldFooter = document.querySelector('.docs-nav-footer');
        var oldSidebar = document.querySelector('.docs-sidebar');
        if (oldArticle) oldArticle.innerHTML = newArticle.innerHTML;
        if (oldFooter && newFooter) oldFooter.innerHTML = newFooter.innerHTML;
        if (oldSidebar && newSidebar) oldSidebar.innerHTML = newSidebar.innerHTML;
        if (newTitle) document.title = newTitle.textContent;
        if (oldArticle) oldArticle.scrollTop = 0;
        var content = document.querySelector('.docs-content');
        if (content) content.scrollTop = 0;
        window.scrollTo(0, 0);
        window._initMermaid();
      }

      (function(){
        document.addEventListener('click', function(e){
          var a = e.target.closest('a');
          if (!a || a.target === '_blank') return;
          var h = a.getAttribute('href');
          if (!h || h.charAt(0) !== '/') return;
          if (h === '/' || h.indexOf('/docs') === 0) {
            e.preventDefault();
            fetch(h, {credentials:'omit'}).then(function(r){
              if (!r.ok) { location.href = h; return; }
              return r.text();
            }).then(function(t){
              if (!t) return;
              history.pushState(null, '', h);
              if (h.indexOf('/docs') === 0) { _swapContent(t, h); }
              else { location.href = h; }
            }).catch(function(){ location.href = h; });
          }
        });
        window.addEventListener('popstate', function(){
          var p = location.pathname;
          if (p.indexOf('/docs') === 0) {
            fetch(p, {credentials:'omit'}).then(function(r){ return r.text(); }).then(function(t){
              _swapContent(t, p);
            });
          } else if (p === '/') {
            location.href = p;
          }
        });
      })();
    </script>
    <script>
      (function(){
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js';
        s.onload = function() { window._initMermaid(); };
        document.body.appendChild(s);
      })();
    </script>
  </div>
</body>
</html>
