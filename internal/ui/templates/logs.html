{{define "page.logs"}}
<div class="log-tabs create-tabs">
  <a class="log-tab create-tab active" data-tab="all">All</a>
  <a class="log-tab create-tab log-tab--relay" data-tab="relay">Relay</a>
  <a class="log-tab create-tab log-tab--video" data-tab="video">Video</a>
  <a class="log-tab create-tab log-tab--peers" data-tab="peers">Peers</a>
  <a class="log-tab create-tab log-tab--errors" data-tab="errors">Errors</a>
  <a class="log-tab create-tab log-tab--data" data-tab="data">Data</a>
  <a class="log-tab create-tab log-tab--group" data-tab="group">Group</a>
  <a class="log-tab create-tab log-tab--encrypt" data-tab="encrypt">Encrypt</a>
  <a class="log-tab create-tab log-tab--cluster" data-tab="cluster">Cluster</a>
  <a class="log-tab create-tab" data-tab="topology">Topology</a>
  <label class="switch" style="margin-left:auto;align-self:center;margin-right:8px" title="Verbose libp2p logging">
    <input id="verboseToggle" type="checkbox" onchange="fetch('/api/logs/verbose',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({on:this.checked})})">
    <span class="slider"></span>
  </label>
  <span class="muted small" style="align-self:center;margin-right:8px">Verbose</span>
  <button id="copyLogsBtn" class="btn btn-sm" style="align-self:center;" title="Copy logs to clipboard">Copy</button>
</div>

<pre id="logbox" class="content"></pre>
<canvas id="topology-canvas" style="display:none;width:100%;height:calc(100vh - 140px);"></canvas>
{{end}}
