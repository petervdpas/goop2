<div class="room-card" data-room-id="{{_id}}">
  <h3 class="room-card-name">{{name}}</h3>
  <p class="room-card-desc">{{description}}</p>
  <div class="room-card-footer">
    <span class="room-card-status"><span class="status-dot"></span> {{status}}</span>
    <button class="btn-join">Join</button>
  </div>
</div>
