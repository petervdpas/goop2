<article class="post" data-id="{{_id}}">
  {{#if image}}
  <a href="post.html?slug={{slug}}"><img class="post-image" src="images/{{image}}" alt=""></a>
  {{/if}}
  <h2 class="post-title"><a class="post-title-link" href="post.html?slug={{slug}}">{{title}}</a></h2>
  <div class="post-meta">{{date}}</div>
  {{#if author_name}}
  <div class="post-byline">by {{author_name}}</div>
  {{/if}}
  <div class="post-body">{{body}}</div>
  <a class="post-read-more" href="post.html?slug={{slug}}">Read more</a>
</article>
